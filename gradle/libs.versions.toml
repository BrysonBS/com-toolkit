spring = "6.2.14"
mybatis-plus = "3.5.15"
mybatis-spring = "3.0.5"
hikaricp = "7.0.2"
log4j-core = "2.24.3"
slf4j-api = "2.0.17"
logback-classic = "1.5.21"
jackson = "2.19.4"
guava = "33.5.0-jre"
commons-beanutils = "1.11.0"
commons-lang3 = "3.20.0"
okhttp = "4.12.0"
cron-utils = "9.2.1"
twelvemonkeys = "3.13.0"
batik-all = "1.19"
webp-imageio = "0.1.6"
google-zxing = "3.5.4"
jnativehook = "2.2.2"

atlantafx-base = "2.1.0"
controlsfx = "11.2.3"
ikonli = "12.4.0"
animatefx = "1.3.0"
richtextfx = "0.11.7"
